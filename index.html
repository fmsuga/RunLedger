<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RunLedger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Literata:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #111111;
  --surface:  #1c1c1c;
  --surface2: #242424;
  --border:   #333;
  --text:     #f0f0f0;
  --muted:    #999;
  --green:    #4ade80;
  --yellow:   #fbbf24;
  --red:      #f87171;
  --accent:   #f0f0f0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Literata', Georgia, serif;
  font-size: 17px;
  line-height: 1.5;
  min-height: 100vh;
  padding-bottom: 100px;
}

/* ── HEADER ── */
header {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 20;
  padding: 16px 18px 0;
}

/* ── HEADER ── */
.logo-bar {
  display: flex;
  align-items: center;
  background: var(--bg);
  border-bottom: 1px solid #1e1e1e;
  padding: 0 18px;
  min-height: 170px;
  gap: 0;
}
.logo-col {
  width: 170px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.logo-imagen {
  height: 160px;
  width: auto;
  display: block;
}
.logo-nombre-col {
  flex: 1;
  display: flex;
  justify-content: center;
  border-left: 1px solid #222;
  margin-left: 4px;
  padding-left: 0;
}
.logo-nombre {
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: .02em;
  line-height: 1.1;
  text-align: center;
}
.logo-nombre span {
  color: #60a5fa;
}
.logo-nombre .runners {
  color: #fb923c;
}
.logo-acciones {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
  flex-shrink: 0;
  margin-left: 12px;
}
.header-actions {
  display: flex;
  gap: 6px;
}

.icon-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 8px 14px;
  font-size: .82rem;
  font-family: 'Literata', serif;
  cursor: pointer;
  transition: background .15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.icon-btn:hover { background: var(--surface2); }

/* ── TABS ── */
.tabs {
  display: flex;
  gap: 4px;
}

.tab {
  flex: 1;
  text-align: center;
  padding: 12px 0;
  font-size: .95rem;
  font-family: 'Literata', serif;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: color .2s, border-color .2s;
  user-select: none;
}

.tab.active {
  color: var(--text);
  border-bottom-color: var(--accent);
}

/* ── SECTIONS ── */
.section { display: none; }
.section.active { display: block; }

/* ── LISTA ALUMNOS ── */
#lista {
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  display: flex;
  align-items: stretch;
  gap: 0;
  overflow: hidden;
  animation: fadeUp .2s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Barra vertical de estado */
.indicador {
  width: 6px;
  flex-shrink: 0;
  border-radius: 0;
}
.verde    { background: var(--green); }
.amarillo { background: var(--yellow); }
.rojo     { background: var(--red); }

/* Contenido interno con padding */
.card-inner {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 14px 14px 14px;
  flex: 1;
  min-width: 0;
}

/* Nombre */
.nombre {
  flex: 1;
  font-size: 1.05rem;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}

/* Botones de acción en fila */
.card-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

.card-btn {
  width: 110px;
  padding: 9px 0;
  border-radius: 8px;
  border: none;
  font-family: 'Literata', serif;
  font-size: .85rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
  white-space: nowrap;
  text-align: center;
}
.card-btn:active { transform: scale(.95); }

/* Pago */
.card-btn.pagar { background: rgba(74,222,128,.18); color: var(--green); }
.card-btn.pagar:hover { opacity: .8; }
.card-btn.pagar.done {
  background: #222;
  color: #444;
  cursor: default;
}
.card-btn.pagar.done:hover { opacity: 1; }

/* Plan */
.card-btn.plan { background: rgba(167,139,250,.18); color: #c4b5fd; }
.card-btn.plan:hover { opacity: .8; }
.card-btn.plan.done {
  background: #222;
  color: #444;
  cursor: default;
}
.card-btn.plan.done:hover { opacity: 1; }

/* Eliminar */
.card-btn.eliminar {
  width: auto;
  padding: 9px 12px;
  background: transparent;
  color: #444;
  font-weight: 400;
  font-size: .8rem;
}
.card-btn.eliminar:hover { color: var(--red); }

/* ── BUSCADOR ── */
.buscar-wrap {
  padding: 12px 16px 4px;
}

#buscar {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px 16px;
  font-family: 'Literata', serif;
  font-size: 1rem;
  color: var(--text);
  outline: none;
  transition: border-color .2s;
}
#buscar:focus { border-color: #555; }
#buscar::placeholder { color: var(--muted); }
#buscar::-webkit-search-cancel-button { cursor: pointer; }
.empty {
  text-align: center;
  padding: 70px 24px;
  color: var(--muted);
  font-size: 1rem;
}
.empty-icon { font-size: 2.4rem; display: block; margin-bottom: 12px; }

/* ── FAB ── */
#btn-agregar {
  position: fixed;
  bottom: 22px;
  right: 18px;
  background: var(--accent);
  color: #111;
  border: none;
  border-radius: 16px;
  padding: 16px 24px;
  font-family: 'Literata', serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 6px 28px rgba(0,0,0,.55);
  transition: transform .15s, box-shadow .15s;
  z-index: 30;
}
#btn-agregar:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.65); }
#btn-agregar:active { transform: scale(.97); }

/* ── RESUMEN ── */
#resumen-content {
  padding: 20px 18px 60px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  max-width: 800px;
  margin: 0 auto;
}

/* Wrapper con efecto papel flotante */
#resumen-inner {
  background: rgba(28, 28, 28, 0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 24px;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  box-shadow: 0 8px 40px rgba(0,0,0,.5);
}

/* Grid de dos columnas para ingresos + donut */
.rs-dos-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  align-items: start;
}
.rs-col-izq {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.rs-col-der {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* Logo row en resumen */
.rs-logo-row {
  padding-bottom: 18px;
  border-bottom: 1px solid rgba(255,255,255,.07);
  text-align: center;
}
.rs-logo-name {
  font-size: 1.1rem;
  font-weight: 700;
  color: #f0f0f0;
}
.rs-logo-sub {
  font-size: .75rem;
  color: #555;
  margin-top: 3px;
}

/* Hero */
.rs-hero {
  background: #f0f0f0;
  border-radius: 16px;
  padding: 22px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.rs-periodo-mes {
  font-size: 1.5rem;
  font-weight: 700;
  color: #111;
  line-height: 1;
}
.rs-periodo-label {
  font-size: .78rem;
  font-weight: 700;
  color: #555;
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: .06em;
}
.rs-total-num {
  font-size: 3rem;
  font-weight: 700;
  color: #111;
  line-height: 1;
  text-align: right;
}
.rs-total-label {
  font-size: .78rem;
  font-weight: 700;
  color: #555;
  text-transform: uppercase;
  letter-spacing: .06em;
  text-align: right;
  margin-top: 4px;
}

/* Bloque de ingreso — protagonista */
.rs-ingresos {
  background: #1c1c1c;
  border: 1px solid #333;
  border-radius: 16px;
  overflow: hidden;
}
.rs-ingreso-row {
  padding: 20px 24px;
  border-bottom: 1px solid #2a2a2a;
}
.rs-ingreso-row:last-child { border-bottom: none; }
.rs-ingreso-label {
  font-size: .82rem;
  font-weight: 700;
  color: #888;
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 6px;
}
.rs-ingreso-valor {
  font-size: 2rem;
  font-weight: 700;
  color: #f0f0f0;
  line-height: 1;
}
.rs-ingreso-row.principal .rs-ingreso-label { color: #bbb; }
.rs-ingreso-row.principal .rs-ingreso-valor { font-size: 2.6rem; color: #fff; }

/* Alumnos con donut */
.rs-alumnos-wrap {
  background: #1c1c1c;
  border: 1px solid #333;
  border-radius: 16px;
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 24px;
}
.rs-donut-wrap { position: relative; flex-shrink: 0; }
.rs-donut-wrap svg { display: block; }
.rs-donut-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.rs-donut-pct {
  font-size: 1.1rem;
  font-weight: 700;
  color: #f0f0f0;
}
.rs-donut-sub {
  font-size: .6rem;
  font-weight: 700;
  color: #666;
  text-transform: uppercase;
  letter-spacing: .04em;
  margin-top: 2px;
}
.rs-alumnos-legend { flex: 1; }
.rs-legend-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 10px;
}
.rs-legend-row:last-child { margin-bottom: 0; }
.rs-legend-num {
  font-size: 1.8rem;
  font-weight: 700;
  color: #f0f0f0;
  line-height: 1;
  min-width: 36px;
}
.rs-legend-label {
  font-size: .82rem;
  font-weight: 700;
  color: #888;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.rs-legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Planificaciones */
.rs-plan-wrap {
  background: #1c1c1c;
  border: 1px solid #333;
  border-radius: 16px;
  padding: 20px 24px;
}
.rs-plan-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 16px;
}
.rs-plan-titulo {
  font-size: .82rem;
  font-weight: 700;
  color: #888;
  text-transform: uppercase;
  letter-spacing: .06em;
}
.rs-plan-pct {
  font-size: 1.1rem;
  font-weight: 700;
  color: #f0f0f0;
}
.rs-plan-nums {
  display: flex;
  gap: 32px;
  margin-bottom: 18px;
}
.rs-plan-num {
  font-size: 2.2rem;
  font-weight: 700;
  color: #f0f0f0;
  line-height: 1;
}
.rs-plan-label {
  font-size: .78rem;
  font-weight: 700;
  color: #888;
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-top: 4px;
}
.rs-plan-enviadas .rs-plan-num { color: #c4b5fd; }
.rs-bar-wrap {
  background: #2a2a2a;
  border-radius: 99px;
  height: 10px;
  overflow: hidden;
  margin-bottom: 6px;
}
.rs-bar-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, #7c3aed, #c4b5fd);
  transition: width .6s ease;
}
.rs-bar-label {
  font-size: .75rem;
  font-weight: 700;
  color: #666;
  text-align: right;
}

/* ── MODAL ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 40;
  align-items: flex-end;
  justify-content: center;
}
.overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 22px 22px 0 0;
  padding: 30px 20px 40px;
  width: 100%;
  max-width: 500px;
  animation: slideUp .25s ease;
}

@keyframes slideUp {
  from { transform: translateY(50px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.modal-title {
  font-family: 'DM Mono', monospace;
  font-size: .9rem;
  letter-spacing: .08em;
  margin-bottom: 20px;
}

.modal input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  font-family: 'Literata', serif;
  font-size: 1.05rem;
  color: var(--text);
  outline: none;
  margin-bottom: 16px;
  transition: border-color .2s;
}
.modal input:focus { border-color: #555; }
.modal input::placeholder { color: var(--muted); }

.modal-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.modal-btns button {
  padding: 16px;
  border-radius: 12px;
  border: none;
  font-family: 'Literata', serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity .15s;
}
.modal-btns button:hover { opacity: .85; }

#btn-confirmar { background: var(--accent); color: #111; }
#btn-cancelar  { background: var(--border);  color: var(--text); }

/* ── CONFIRM MODAL ── */
.confirm-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.8);
  z-index: 50;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.confirm-overlay.open { display: flex; }

.confirm-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 28px 24px;
  width: 100%;
  max-width: 360px;
  text-align: center;
  animation: popIn .2s ease;
}

@keyframes popIn {
  from { transform: scale(.92); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}

.confirm-icon  { font-size: 2rem; margin-bottom: 12px; }
.confirm-msg   { font-size: 1.05rem; line-height: 1.5; margin-bottom: 24px; }
.confirm-name  { font-weight: 700; color: var(--green); }

.confirm-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.confirm-btns button {
  padding: 15px;
  border-radius: 12px;
  border: none;
  font-family: 'Literata', serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
}

#confirm-si  { background: var(--green);  color: #111; }
#confirm-no  { background: var(--border); color: var(--text); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" style="
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; padding:20px;">
  <div style="
    background:#1c1c1c; border:1px solid #333; border-radius:18px;
    padding:36px 28px; width:100%; max-width:360px;">
    <div style="font-size:1.2rem;font-weight:700;margin-bottom:6px;">RunLedger</div>
    <div style="font-size:.88rem;color:#999;margin-bottom:28px;">Ingresá para continuar</div>
    <input id="login-email" type="email" placeholder="Email"
      style="width:100%;background:#111;border:1px solid #333;border-radius:10px;
             padding:14px 16px;font-family:'Literata',serif;font-size:1rem;
             color:#f0f0f0;outline:none;margin-bottom:12px;" />
    <input id="login-pass" type="password" placeholder="Contraseña"
      style="width:100%;background:#111;border:1px solid #333;border-radius:10px;
             padding:14px 16px;font-family:'Literata',serif;font-size:1rem;
             color:#f0f0f0;outline:none;margin-bottom:8px;" />
    <div id="login-error" style="color:#f87171;font-size:.82rem;min-height:20px;margin-bottom:12px;"></div>
    <button id="login-btn" style="
      width:100%;background:#f0f0f0;color:#111;border:none;border-radius:10px;
      padding:15px;font-family:'Literata',serif;font-size:1rem;font-weight:700;cursor:pointer;">
      Entrar
    </button>
  </div>
</div>

<!-- APP (oculta hasta autenticar) -->
<div id="app-screen" style="display:none;">
  <!-- Header dos columnas -->
  <div class="logo-bar">
    <div class="logo-col">
      <img src="media/logo.png" alt="Deltarunners" class="logo-imagen">
    </div>
    <div class="logo-nombre-col">
      <div class="logo-nombre"><span>Delta</span><span class="runners">runners</span></div>
    </div>
    <div class="logo-acciones">
      <div class="header-actions">
        <button class="icon-btn" id="btn-precio">⚙ Precio</button>
        <button class="icon-btn" id="btn-exportar">↓</button>
        <button class="icon-btn" id="btn-importar">↑</button>
        <button class="icon-btn" id="btn-salir" style="color:#f87171;">Salir</button>
        <input type="file" id="importFile" hidden accept=".json">
      </div>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" id="tab-alumnos">Alumnos</div>
    <div class="tab"        id="tab-resumen">Resumen</div>
  </div>
</header>

<!-- ALUMNOS -->
<div id="alumnos" class="section active">
  <div class="buscar-wrap">
    <input type="search" id="buscar" placeholder="Buscar alumno..." oninput="renderAlumnos()" autocomplete="off" />
  </div>
  <div id="lista"></div>
  <button id="btn-agregar">+ Nuevo alumno</button>
</div>

<!-- RESUMEN -->
<div id="resumen" class="section">
  <div id="resumen-content"></div>
</div>

<!-- Modal agregar -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title">NUEVO ALUMNO</div>
    <input type="text" id="input-nombre" placeholder="Nombre completo" maxlength="60" />
    <input type="date" id="input-fnac" style="margin-bottom:0" />
    <div style="font-size:.75rem;color:#666;margin:-10px 0 16px;padding-left:4px;">Fecha de nacimiento (opcional)</div>
    <div class="modal-btns">
      <button id="btn-cancelar">Cancelar</button>
      <button id="btn-confirmar">Agregar</button>
    </div>
  </div>
</div>

<!-- Modal confirm pago -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-icon">✅</div>
    <div class="confirm-msg">¿Confirmás el pago de<br><span class="confirm-name" id="confirm-nombre"></span>?</div>
    <div class="confirm-btns">
      <button id="confirm-no-pago">No</button>
      <button id="confirm-si-pago">Sí, pagó</button>
    </div>
  </div>
</div>

<!-- Modal confirm planificación -->
<div class="confirm-overlay" id="plan-overlay">
  <div class="confirm-box">
    <div class="confirm-icon">📋</div>
    <div class="confirm-msg">¿Confirmás que enviaste la planificación de<br><span class="confirm-name" id="plan-nombre"></span>?</div>
    <div class="confirm-btns">
      <button id="confirm-no-plan">No</button>
      <button style="background:#a78bfa;color:#111;padding:15px;border-radius:12px;border:none;font-family:'Literata',serif;font-size:1rem;font-weight:700;cursor:pointer;" id="confirm-si-plan">Sí, enviada</button>
    </div>
  </div>
</div>
</div><!-- /app-screen -->

<!-- Modal perfil alumno -->
<div class="confirm-overlay" id="perfil-overlay">
  <div class="confirm-box" style="text-align:left;max-width:400px;width:100%;">
    <div style="font-size:1.1rem;font-weight:700;margin-bottom:4px;" id="perfil-titulo">Perfil</div>
    <div style="font-size:.8rem;color:#666;margin-bottom:24px;">Editá los datos del alumno</div>

    <label style="font-size:.75rem;color:#888;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px;">Nombre</label>
    <input type="text" id="perfil-nombre" maxlength="60" style="
      width:100%;background:#111;border:1px solid #333;border-radius:10px;
      padding:13px 16px;font-family:'Literata',serif;font-size:1rem;
      color:#f0f0f0;outline:none;margin-bottom:18px;" />

    <label style="font-size:.75rem;color:#888;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px;">Fecha de nacimiento</label>
    <input type="date" id="perfil-fnac" style="
      width:100%;background:#111;border:1px solid #333;border-radius:10px;
      padding:13px 16px;font-family:'Literata',serif;font-size:1rem;
      color:#f0f0f0;outline:none;margin-bottom:24px;" />

    <div class="confirm-btns">
      <button id="perfil-cancelar" style="background:#2a2a2a;color:#f0f0f0;padding:15px;border-radius:12px;border:none;font-family:'Literata',serif;font-size:1rem;font-weight:700;cursor:pointer;">Cancelar</button>
      <button id="perfil-guardar"  style="background:#f0f0f0;color:#111;padding:15px;border-radius:12px;border:none;font-family:'Literata',serif;font-size:1rem;font-weight:700;cursor:pointer;">Guardar</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }                        from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js';
import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js';
import { getAuth, signInWithEmailAndPassword,
         onAuthStateChanged, signOut }            from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js';

// ─── CONFIG ──────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyDD_BHObMSasVcUwFIUOm_M100uCakI498",
  authDomain:        "runledger.firebaseapp.com",
  projectId:         "runledger",
  storageBucket:     "runledger.firebasestorage.app",
  messagingSenderId: "465777579099",
  appId:             "1:465777579099:web:180da05212713cd0101b7e"
};

const app         = initializeApp(firebaseConfig);
const db          = getFirestore(app);
const auth        = getAuth(app);
const REF_ALUMNOS = doc(db, 'runledger', 'alumnos');
const REF_CONFIG  = doc(db, 'runledger', 'config');

let _alumnos = [];
let _config  = { precio: 0 };
let _listo   = false;

// ─── TIEMPO ──────────────────────────────────────────────────────────────────
function getMesActual() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function getDia() { return new Date().getDate(); }

function formatMesLabel(ym) {
  if (!ym) return 'sin pagos';
  const [y, m] = ym.split('-');
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                 'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return `${meses[+m-1]} ${y}`;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ─── ESTADO ──────────────────────────────────────────────────────────────────
function getEstado(a) {
  if (a.ultimoMesPagado === getMesActual()) return 'verde';
  return getDia() <= 10 ? 'amarillo' : 'rojo';
}

// ─── FIRESTORE ───────────────────────────────────────────────────────────────
async function guardarAlumnos(lista) {
  await setDoc(REF_ALUMNOS, { lista });
}
async function guardarConfig(cfg) {
  _config = cfg;
  await setDoc(REF_CONFIG, cfg);
}

// ─── DATOS ───────────────────────────────────────────────────────────────────
async function agregarAlumno(nombre, fechaNac) {
  await guardarAlumnos([..._alumnos, {
    id:              Date.now(),
    nombre:          capitalizar(nombre.trim()),
    fechaAlta:       new Date().toISOString().slice(0, 10),
    fechaNacimiento: fechaNac || null,
    ultimoMesPagado: null,
    ultimoPlanMes:   null
  }]);
}
async function eliminarAlumno(id) {
  await guardarAlumnos(_alumnos.filter(a => a.id !== id));
}
async function pagarAlumno(id) {
  await guardarAlumnos(_alumnos.map(a =>
    a.id === id && a.ultimoMesPagado !== getMesActual()
      ? { ...a, ultimoMesPagado: getMesActual() } : a
  ));
}
async function enviarPlan(id) {
  await guardarAlumnos(_alumnos.map(a =>
    a.id === id && (a.ultimoPlanMes || null) !== getMesActual()
      ? { ...a, ultimoPlanMes: getMesActual() } : a
  ));
}

// ─── RENDER ALUMNOS ──────────────────────────────────────────────────────────
function renderAlumnos() {
  const lista = document.getElementById('lista');
  const mes   = getMesActual();

  if (!_listo) {
    lista.innerHTML = `<div class="empty"><span class="empty-icon">⏳</span>Cargando...</div>`;
    return;
  }
  if (!_alumnos.length) {
    lista.innerHTML = `<div class="empty"><span class="empty-icon">📋</span>No hay alumnos todavía.<br>Agregá el primero abajo.</div>`;
    return;
  }

  const query  = (document.getElementById('buscar')?.value || '').toLowerCase().trim();
  const sorted = [..._alumnos]
    .filter(a => !query || a.nombre.toLowerCase().includes(query))
    .sort((a, b) => a.nombre.localeCompare(b.nombre, 'es', { sensitivity: 'base' }));

  if (!sorted.length) {
    lista.innerHTML = `<div class="empty"><span class="empty-icon">🔍</span>No se encontró "${esc(query)}"</div>`;
    return;
  }

  lista.innerHTML = sorted.map(a => {
    const est         = getEstado(a);
    const pagado      = a.ultimoMesPagado === mes;
    const planEnviada = (a.ultimoPlanMes || null) === mes;

    const fnacLabel = a.fechaNacimiento
      ? (() => { const [y,m,d] = a.fechaNacimiento.split('-'); return `${d}/${m}/${y}`; })()
      : null;

    return `
      <div class="card">
        <div class="indicador ${est}"></div>
        <div class="card-inner">
          <div style="flex:1;min-width:0;">
            <div class="nombre">${esc(a.nombre)}</div>
            ${fnacLabel ? `<div style="font-size:.75rem;color:#555;margin-top:2px;">🎂 ${fnacLabel}</div>` : ''}
          </div>
          <div class="card-actions">
            <button class="card-btn pagar ${pagado ? 'done' : ''}"
              data-action="pagar" data-id="${a.id}" data-nombre="${esc(a.nombre)}">
              ${pagado ? 'Pagado' : 'Pago'}
            </button>
            <button class="card-btn plan ${planEnviada ? 'done' : ''}"
              data-action="plan" data-id="${a.id}" data-nombre="${esc(a.nombre)}">
              ${planEnviada ? 'Plan ✔' : 'Planificación'}
            </button>
            <button class="card-btn eliminar" style="color:#60a5fa;"
              data-action="perfil" data-id="${a.id}">
              Info
            </button>
            <button class="card-btn eliminar"
              data-action="eliminar" data-id="${a.id}" data-nombre="${esc(a.nombre)}">
              Eliminar
            </button>
          </div>
        </div>
      </div>`;
  }).join('');
}

// ─── RENDER RESUMEN ──────────────────────────────────────────────────────────
function renderResumen() {
  const precio = _config.precio || 0;
  const mes    = getMesActual();
  const data   = _alumnos;

  const total        = data.length;
  const pagaron      = data.filter(a => a.ultimoMesPagado === mes).length;
  const deben        = total - pagaron;
  const planEnviadas = data.filter(a => (a.ultimoPlanMes || null) === mes).length;
  const planPend     = total - planEnviadas;
  const esperado     = total * precio;
  const ingresado    = pagaron * precio;
  const pctPlan      = total ? Math.round((planEnviadas / total) * 100) : 0;
  const pctPago      = total ? Math.round((pagaron / total) * 100) : 0;
  const $fmt = n => precio > 0 ? '$' + n.toLocaleString('es-AR') : '—';

  // Donut pagos (verde)
  const r = 36, cx = 44, cy = 44, stroke = 10;
  const circ = 2 * Math.PI * r;
  const dash = total > 0 ? (pagaron / total) * circ : 0;

  const donut = `
    <svg width="88" height="88" viewBox="0 0 88 88">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none"
        stroke="#2a2a2a" stroke-width="${stroke}"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none"
        stroke="#4ade80" stroke-width="${stroke}"
        stroke-dasharray="${dash} ${circ}"
        stroke-dashoffset="${circ / 4}"
        stroke-linecap="round"/>
    </svg>`;

  // Donut planificaciones (violeta)
  const dashPlan = total > 0 ? (planEnviadas / total) * circ : 0;
  const donutPlan = `
    <svg width="88" height="88" viewBox="0 0 88 88">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none"
        stroke="#2a2a2a" stroke-width="${stroke}"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none"
        stroke="#a78bfa" stroke-width="${stroke}"
        stroke-dasharray="${dashPlan} ${circ}"
        stroke-dashoffset="${circ / 4}"
        stroke-linecap="round"/>
    </svg>`;

  document.getElementById('resumen-content').innerHTML = `
  <div id="resumen-inner">

    <!-- LOGO -->
    <div class="rs-logo-row">
      <div class="rs-logo-name">Deltarunners</div>
      <div class="rs-logo-sub">Resumen mensual</div>
    </div>

    <!-- PERÍODO -->
    <div class="rs-hero">
      <div>
        <div class="rs-periodo-label">Período actual</div>
        <div class="rs-periodo-mes">${formatMesLabel(mes)}</div>
      </div>
    </div>

    <!-- TOTAL ALUMNOS -->
    <div class="rs-hero">
      <div>
        <div class="rs-periodo-label">Total alumnos</div>
        <div class="rs-total-num">${total}</div>
      </div>
    </div>

    <!-- INGRESOS + DONUT en dos columnas -->
    <div class="rs-dos-col">

      <!-- COL IZQUIERDA: ingresos -->
      <div class="rs-col-izq">
        <div class="rs-ingresos">
          <div class="rs-ingreso-row principal">
            <div class="rs-ingreso-label">Ingreso actual</div>
            <div class="rs-ingreso-valor">${$fmt(ingresado)}</div>
          </div>
          <div class="rs-ingreso-row">
            <div class="rs-ingreso-label">Ingreso esperado</div>
            <div class="rs-ingreso-valor">${$fmt(esperado)}</div>
          </div>
        </div>
      </div>

      <!-- COL DERECHA: donut pagos -->
      <div class="rs-col-der">
        <div class="rs-alumnos-wrap">
          <div class="rs-alumnos-legend">
            <div class="rs-legend-row">
              <div class="rs-legend-dot" style="background:#4ade80"></div>
              <div class="rs-legend-num">${pagaron}</div>
              <div class="rs-legend-label">Pagaron</div>
            </div>
            <div class="rs-legend-row">
              <div class="rs-legend-dot" style="background:#f87171"></div>
              <div class="rs-legend-num">${deben}</div>
              <div class="rs-legend-label">Deben</div>
            </div>
          </div>
          <div class="rs-donut-wrap">
            ${donut}
            <div class="rs-donut-center">
              <span class="rs-donut-pct">${pctPago}%</span>
              <span class="rs-donut-sub">pagó</span>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- PLANIFICACIONES -->
    <div class="rs-plan-wrap">
      <div class="rs-plan-header">
        <div class="rs-plan-titulo">Planificaciones</div>
      </div>
      <div style="display:flex;align-items:center;gap:24px;">
        <div class="rs-alumnos-legend" style="flex:1;">
          <div class="rs-legend-row">
            <div class="rs-legend-dot" style="background:#c4b5fd"></div>
            <div class="rs-legend-num" style="color:#c4b5fd;">${planEnviadas}</div>
            <div class="rs-legend-label">Enviadas</div>
          </div>
          <div class="rs-legend-row">
            <div class="rs-legend-dot" style="background:#444"></div>
            <div class="rs-legend-num">${planPend}</div>
            <div class="rs-legend-label">Pendientes</div>
          </div>
        </div>
        <div class="rs-donut-wrap">
          ${donutPlan}
          <div class="rs-donut-center">
            <span class="rs-donut-pct" style="color:#c4b5fd;">${pctPlan}%</span>
            <span class="rs-donut-sub">enviado</span>
          </div>
        </div>
      </div>
    </div>

  </div>
  `;
}

function render() { renderAlumnos(); renderResumen(); }

// ─── MODALES ─────────────────────────────────────────────────────────────────
function abrirModal() {
  document.getElementById('input-nombre').value = '';
  document.getElementById('input-fnac').value   = '';
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('input-nombre').focus(), 120);
}
function cerrarModal() {
  document.getElementById('overlay').classList.remove('open');
}
async function confirmarAgregar() {
  const nombre  = document.getElementById('input-nombre').value.trim();
  const fechaNac = document.getElementById('input-fnac').value || null;
  if (!nombre) { document.getElementById('input-nombre').focus(); return; }
  await agregarAlumno(nombre, fechaNac);
  cerrarModal();
}

const capitalizar = s => s.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
let _perfilId = null;
function abrirPerfil(id) {
  const a = _alumnos.find(x => x.id === id);
  if (!a) return;
  _perfilId = id;
  document.getElementById('perfil-titulo').textContent  = a.nombre;
  document.getElementById('perfil-nombre').value        = a.nombre;
  document.getElementById('perfil-fnac').value          = a.fechaNacimiento || '';
  document.getElementById('perfil-overlay').classList.add('open');
}
function cerrarPerfil() {
  _perfilId = null;
  document.getElementById('perfil-overlay').classList.remove('open');
}
async function guardarPerfil() {
  if (_perfilId === null) return;
  const nombre = capitalizar(document.getElementById('perfil-nombre').value.trim());
  const fnac   = document.getElementById('perfil-fnac').value || null;
  if (!nombre) { document.getElementById('perfil-nombre').focus(); return; }
  await guardarAlumnos(_alumnos.map(a =>
    a.id === _perfilId ? { ...a, nombre, fechaNacimiento: fnac } : a
  ));
  cerrarPerfil();
}
let _pagoId = null;
function abrirConfirmPago(id, nombre) {
  _pagoId = id;
  document.getElementById('confirm-nombre').textContent = nombre;
  document.getElementById('confirm-overlay').classList.add('open');
}
function cerrarConfirmPago() {
  _pagoId = null;
  document.getElementById('confirm-overlay').classList.remove('open');
}
async function ejecutarPago() {
  if (_pagoId !== null) await pagarAlumno(_pagoId);
  cerrarConfirmPago();
}

// ─── CONFIRM PLAN ────────────────────────────────────────────────────────────
let _planId = null;
function abrirConfirmPlan(id, nombre) {
  _planId = id;
  document.getElementById('plan-nombre').textContent = nombre;
  document.getElementById('plan-overlay').classList.add('open');
}
function cerrarConfirmPlan() {
  _planId = null;
  document.getElementById('plan-overlay').classList.remove('open');
}
async function ejecutarPlan() {
  if (_planId !== null) await enviarPlan(_planId);
  cerrarConfirmPlan();
}

// ─── ELIMINAR ────────────────────────────────────────────────────────────────
async function pedirEliminar(id, nombre) {
  if (confirm(`¿Eliminar a ${nombre}?`)) await eliminarAlumno(id);
}

// ─── TABS ────────────────────────────────────────────────────────────────────
function cambiarTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tab)?.classList.add('active');
  document.getElementById('tab-' + tab)?.classList.add('active');
}

// ─── PRECIO ──────────────────────────────────────────────────────────────────
async function configurarPrecio() {
  const nuevo = prompt('Precio mensual por alumno ($):', _config.precio || '');
  if (nuevo === null) return;
  await guardarConfig({ precio: Number(nuevo) });
  renderResumen();
}

// ─── EXPORT / IMPORT ─────────────────────────────────────────────────────────
function exportar() {
  const blob = new Blob([JSON.stringify(_alumnos, null, 2)], { type: 'application/json' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `runledger_backup_${getMesActual()}.json`;
  a.click();
}
function importar(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    try { await guardarAlumnos(JSON.parse(reader.result)); }
    catch { alert('Archivo inválido.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ─── EVENT LISTENERS ─────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {

  // Login
  const doLogin = async () => {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    document.getElementById('login-error').textContent = '';
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) {
      document.getElementById('login-error').textContent = 'Email o contraseña incorrectos.';
    }
  };
  document.getElementById('login-btn')?.addEventListener('click', doLogin);
  document.getElementById('login-pass')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  // App
  document.getElementById('btn-agregar')    ?.addEventListener('click', abrirModal);
  document.getElementById('btn-cancelar')   ?.addEventListener('click', cerrarModal);
  document.getElementById('btn-confirmar')  ?.addEventListener('click', confirmarAgregar);
  document.getElementById('btn-precio')     ?.addEventListener('click', configurarPrecio);
  document.getElementById('btn-exportar')   ?.addEventListener('click', exportar);
  document.getElementById('btn-importar')   ?.addEventListener('click', () => document.getElementById('importFile').click());
  document.getElementById('importFile')     ?.addEventListener('change', importar);
  document.getElementById('btn-salir')      ?.addEventListener('click', () => signOut(auth));
  document.getElementById('tab-alumnos')    ?.addEventListener('click', () => cambiarTab('alumnos'));
  document.getElementById('tab-resumen')    ?.addEventListener('click', () => cambiarTab('resumen'));
  document.getElementById('perfil-cancelar')?.addEventListener('click', cerrarPerfil);
  document.getElementById('perfil-guardar') ?.addEventListener('click', guardarPerfil);
  document.getElementById('confirm-si-pago')?.addEventListener('click', ejecutarPago);
  document.getElementById('confirm-no-pago')?.addEventListener('click', cerrarConfirmPago);
  document.getElementById('confirm-si-plan')?.addEventListener('click', ejecutarPlan);
  document.getElementById('confirm-no-plan')?.addEventListener('click', cerrarConfirmPlan);
  document.getElementById('input-nombre')   ?.addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmarAgregar();
  });
  document.getElementById('overlay')?.addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) cerrarModal();
  });
  document.getElementById('buscar')?.addEventListener('input', renderAlumnos);

  // Delegación para cards dinámicas
  document.getElementById('lista')?.addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const { action, id, nombre } = btn.dataset;
    const numId = Number(id);
    if (action === 'pagar'    && !btn.classList.contains('done')) abrirConfirmPago(numId, nombre);
    if (action === 'plan'     && !btn.classList.contains('done')) abrirConfirmPlan(numId, nombre);
    if (action === 'perfil')   abrirPerfil(numId);
    if (action === 'eliminar') pedirEliminar(numId, nombre);
  });
});

// ─── AUTH STATE ──────────────────────────────────────────────────────────────
let _unsubAlumnos = null;
let _unsubConfig  = null;

onAuthStateChanged(auth, user => {
  const loginScreen = document.getElementById('login-screen');
  const appScreen   = document.getElementById('app-screen');

  if (user) {
    // Autenticado: mostrar app, ocultar login
    loginScreen.style.display = 'none';
    appScreen.style.display   = 'block';

    // Iniciar escucha en tiempo real
    _unsubAlumnos = onSnapshot(REF_ALUMNOS, snap => {
      _alumnos = snap.exists() ? (snap.data().lista || []) : [];
      _listo   = true;
      render();
    });
    _unsubConfig = onSnapshot(REF_CONFIG, snap => {
      _config = snap.exists() ? snap.data() : { precio: 0 };
      renderResumen();
    });

  } else {
    // No autenticado: mostrar login, ocultar app
    loginScreen.style.display = 'flex';
    appScreen.style.display   = 'none';
    _listo = false;

    // Cancelar escuchas activas
    if (_unsubAlumnos) { _unsubAlumnos(); _unsubAlumnos = null; }
    if (_unsubConfig)  { _unsubConfig();  _unsubConfig  = null; }
  }
});
</script>
</body>
</html>
